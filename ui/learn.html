<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribute Knowledge — RAG Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col" x-data="learnApp()" x-init="init()">

    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">R</div>
            <h1 class="text-lg font-semibold text-gray-800">Contribute Knowledge</h1>
        </div>
        <div id="site-nav"></div>
    </header>

    <!-- Main -->
    <main class="flex-1 py-10 px-4">
        <div class="max-w-2xl mx-auto">

            <!-- Success state -->
            <div x-show="learnedId" x-cloak class="bg-green-50 border border-green-200 rounded-2xl p-8 text-center">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-lg font-bold text-green-800 mb-1">Knowledge Added</h2>
                <p class="text-sm text-green-600 mb-3">Knowledge indexed and searchable (score ×0.7 until admin verifies).</p>
                <div class="flex items-center justify-center space-x-2 mb-6">
                    <span class="text-xs text-gray-500">ID:</span>
                    <code class="bg-white border border-green-200 text-green-800 font-mono text-sm px-3 py-1 rounded-lg cursor-pointer hover:bg-green-50 transition"
                          x-text="learnedId"
                          @click="copyId()"
                          :title="copied ? 'Copied!' : 'Click to copy'">
                    </code>
                    <span x-show="copied" x-cloak class="text-xs text-green-600 font-medium">Copied!</span>
                </div>
                <div class="flex justify-center space-x-3">
                    <button @click="reset()" class="px-4 py-2 bg-white border border-green-300 text-green-700 rounded-lg text-sm font-medium hover:bg-green-50 transition">Add Another</button>
                    <a href="/" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Back to Search</a>
                </div>
            </div>

            <!-- Form -->
            <div x-show="!learnedId">
                <p class="text-sm text-gray-500 mb-6">Contribute verified knowledge. Only submit information you know is correct.</p>

                <form @submit.prevent="submit()" class="space-y-5">

                    <!-- Title -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Title <span class="text-red-400">*</span></label>
                        <input type="text" x-model="form.title" required
                               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none"
                               placeholder="Short description of this knowledge">
                    </div>

                    <!-- Content -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Content <span class="text-red-400">*</span> <span class="text-gray-400 font-normal">(Supports Markdown)</span></label>
                        <textarea x-model="form.content" required rows="8"
                                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-y"
                                  placeholder="Knowledge content, supports Markdown..."></textarea>
                    </div>

                    <!-- Tags -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
                            Tags
                            <span class="text-gray-400 font-normal ml-1">(Optional, comma-separated)</span>
                        </label>
                        <input type="text" x-model="form.tags"
                               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none"
                               placeholder="deployment, domain, billing">
                    </div>

                    <!-- Source Query -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
                            Source Query
                            <span class="text-gray-400 font-normal ml-1">(Optional)</span>
                        </label>
                        <input type="text" x-model="form.source_query"
                               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none"
                               placeholder="The original user question that prompted this knowledge">
                    </div>

                    <!-- API Key -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">API Key</label>
                        <input type="password" x-model="apiKey" @input="saveApiKey()"
                               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none"
                               placeholder="rag_xxxxxxxxxxxxxxxx">
                    </div>

                    <!-- Error -->
                    <div x-show="error" x-cloak class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3" x-text="error"></div>

                    <!-- Submit -->
                    <button type="submit" :disabled="submitting"
                            class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 disabled:opacity-50 transition">
                        <span x-show="!submitting">Submit</span>
                        <span x-show="submitting" x-cloak>Submitting...</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function learnApp() {
            return {
                form: { title: '', content: '', tags: '', source_query: '' },
                apiKey: '',
                learnedId: '',
                copied: false,
                submitting: false,
                error: '',

                init() {
                    this.apiKey = localStorage.getItem('rag_api_key') || '';
                },

                saveApiKey() {
                    const key = this.apiKey.trim();
                    if (key) localStorage.setItem('rag_api_key', key);
                    else localStorage.removeItem('rag_api_key');
                },

                async submit() {
                    this.error = '';
                    this.submitting = true;
                    try {
                        const headers = { 'Content-Type': 'application/json' };
                        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
                        const tags = this.form.tags.trim()
                            ? this.form.tags.split(',').map(t => t.trim()).filter(Boolean)
                            : [];
                        const body = { title: this.form.title, content: this.form.content, tags };
                        if (this.form.source_query.trim()) body.source_query = this.form.source_query.trim();
                        const res = await fetch('/api/learn', {
                            method: 'POST',
                            headers,
                            body: JSON.stringify(body)
                        });
                        if (!res.ok) {
                            const data = await res.json().catch(() => ({}));
                            throw new Error(data.error || `HTTP ${res.status}`);
                        }
                        const data = await res.json();
                        this.learnedId = data.id;
                    } catch (err) {
                        this.error = 'Submission failed:' + err.message;
                    } finally {
                        this.submitting = false;
                    }
                },

                async copyId() {
                    try {
                        await navigator.clipboard.writeText(this.learnedId);
                        this.copied = true;
                        setTimeout(() => this.copied = false, 2000);
                    } catch (err) {
                        // clipboard not available (e.g. HTTP context)
                    }
                },

                reset() {
                    this.form = { title: '', content: '', tags: '', source_query: '' };
                    this.learnedId = '';
                    this.error = '';
                    this.copied = false;
                }
            }
        }
    </script>
    <script src="/nav.js"></script>
</body>
</html>
