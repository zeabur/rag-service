<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .markdown-content h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.75rem; }
        .markdown-content p { margin-bottom: 1rem; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content code { background-color: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
        .markdown-content pre { background-color: #f8f9fa; border: 1px solid #e9ecef; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; position: relative; }
        .markdown-content pre code { background-color: transparent; padding: 0; font-size: 0.85rem; }
        .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; font-size: 0.7rem; background: #fff; border: 1px solid #ddd; padding: 2px 6px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .markdown-content pre:hover .copy-btn { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col" x-data="chatApp()" x-init="init()">
    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">R</div>
            <h1 class="text-lg font-semibold text-gray-800">RAG Service</h1>
        </div>
        <div class="flex items-center space-x-3">
            <div id="site-nav"></div>
            <button @click="showSettingsModal = true"
                    class="relative flex items-center space-x-1.5 border rounded-md px-3 py-1.5 bg-white transition"
                    :class="settings.apiKey ? 'border-gray-300 text-gray-500 hover:border-indigo-400 hover:text-indigo-600' : 'border-orange-300 text-orange-500 hover:border-orange-400'"
                    title="Settings">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-sm">Settings</span>
                <span x-show="settings.apiKey" x-cloak class="absolute -top-1 -right-1 w-2 h-2 bg-green-500 rounded-full"></span>
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6" id="chat-messages">
        <template x-for="(msg, index) in messages" :key="index">
            <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                <div :class="msg.role === 'user' ? 'bg-indigo-600 text-white max-w-[80%]' : 'bg-white border text-gray-800 max-w-[95%] lg:max-w-[80%]'" 
                     class="rounded-2xl px-5 py-4 shadow-sm relative group">
                    
                    <!-- Role Label -->
                    <div class="text-[10px] uppercase font-bold tracking-wider mb-1 opacity-50" 
                         :class="msg.role === 'user' ? 'text-right' : 'text-left'">
                        <span x-text="msg.role === 'user' ? 'You' : 'Assistant'"></span>
                    </div>

                    <!-- Content -->
                    <div class="markdown-content prose max-w-none" x-html="renderMarkdown(msg.content)"></div>

                    <!-- Sources -->
                    <template x-if="msg.chunks && msg.chunks.length > 0">
                        <div class="mt-4 pt-4 border-t border-gray-100">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center">
                                    <svg class="w-3 h-3 text-indigo-500 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">參考文獻 (RAG Sources)</p>
                                </div>
                                <!-- Feedback Buttons -->
                                <div class="flex items-center space-x-2" x-show="!msg.feedbackSent">
                                    <button @click="sendFeedback(msg, 1)" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-green-600 transition" title="有幫助">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.708C19.921 10 21 11.071 21 12.389c0 .546-.188 1.054-.505 1.462l-2.43 3.125A3 3 0 0115.702 18H11v-8l3-4V4h-1v4l-3 4H4v6h4v2H4a2 2 0 01-2-2v-6a2 2 0 012-2h4l3-4V4a2 2 0 012-2h1a2 2 0 012 2v2.5l-3 4z"></path></svg>
                                    </button>
                                    <button @click="sendFeedback(msg, -1)" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-red-600 transition" title="沒幫助">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.292C4.079 14 3 12.929 3 11.611c0-.546.188-1.054.505-1.462l2.43-3.125A3 3 0 018.298 6H13v8l-3 4v2h1v-4l3-4h4v-6h-4v-2h4a2 2 0 012 2v6a2 2 0 01-2 2h-4l-3 4v2a2 2 0 01-2 2h-1a2 2 0 01-2-2v-2.5l3-4z"></path></svg>
                                    </button>
                                </div>
                                <div x-show="msg.feedbackSent" class="text-[10px] text-green-600 font-bold italic" x-cloak>已收到回饋！</div>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <template x-for="chunk in msg.chunks" :key="chunk.id">
                                    <div class="flex items-center gap-1">
                                        <button @click="showSource(chunk)"
                                                class="text-[10px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-full border border-indigo-100 transition flex items-center">
                                            <span x-text="chunk.id"></span>
                                            <span class="ml-1 opacity-50" x-text="'(' + (chunk.similarity * 100).toFixed(0) + '%)'"></span>
                                            <span class="ml-1.5 pl-1.5 border-l border-indigo-200 text-[9px]" x-text="formatDate(chunk.created_at)"></span>
                                        </button>
                                        <a :href="'/report?chunk_id=' + encodeURIComponent(chunk.id) + '&query=' + encodeURIComponent(msg.queryContext || '')"
                                           target="_blank"
                                           rel="noopener noreferrer"
                                           class="text-[10px] bg-red-50 hover:bg-red-100 text-red-600 px-2.5 py-1 rounded-full border border-red-100 transition flex items-center">
                                            回報
                                        </a>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Loading Indicator -->
        <div x-show="loading" class="flex justify-start" x-cloak>
            <div class="bg-white border rounded-2xl px-6 py-4 shadow-sm flex items-center space-x-2">
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                <span class="text-xs text-gray-400 ml-2" x-text="loadingStatus"></span>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div x-show="showSettingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak @click.self="showSettingsModal = false; sessionStorage.setItem('rag_settings_dismissed', '1')">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden">
            <div class="bg-gray-800 px-6 py-5 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <h2 class="text-lg font-bold text-white">設定</h2>
                </div>
                <button @click="showSettingsModal = false" class="text-white/60 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-6">
                <!-- API Key -->
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">API Key</label>
                    <input type="password" x-model="apiKeyInput" @input="saveApiKey()"
                           class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none font-mono text-sm"
                           placeholder="rag_xxxxxxxxxxxxxxxx">
                    <p x-show="settings.apiKey" x-cloak class="text-xs text-green-600 mt-1.5">✓ 已設定</p>
                </div>
                <!-- Model -->
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">模型</label>
                    <select x-model="settings.model" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none bg-white">
                        <optgroup label="Anthropic">
                            <option value="claude-opus-4-5">Claude Opus 4.5</option>
                            <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
                            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
                        </optgroup>
                        <optgroup label="OpenAI">
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                        </optgroup>
                        <optgroup label="Google">
                            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                        </optgroup>
                        <optgroup label="Other">
                            <option value="deepseek-v3">DeepSeek V3</option>
                            <option value="deepseek-r1">DeepSeek R1</option>
                        </optgroup>
                    </select>
                </div>
                <!-- Hybrid Search -->
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-800">Hybrid Search</div>
                        <div class="text-xs text-gray-400 mt-0.5">BM25 + semantic 混合搜尋</div>
                    </div>
                    <button @click="settings.hybrid = !settings.hybrid"
                            class="relative w-11 h-6 rounded-full transition-colors"
                            :class="settings.hybrid ? 'bg-indigo-600' : 'bg-gray-200'">
                        <span class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"
                              :class="settings.hybrid ? 'translate-x-5' : 'translate-x-0'"></span>
                    </button>
                </div>
                <!-- Decay -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <div>
                            <div class="text-sm font-medium text-gray-800">時間衰減</div>
                            <div class="text-xs text-gray-400 mt-0.5">較小的數字會讓舊資料權重降得更快，0 = 關閉</div>
                        </div>
                        <span class="text-sm font-mono text-indigo-600 font-bold" x-text="settings.decay === '0' || settings.decay === 0 ? '關閉' : settings.decay + 'd'"></span>
                    </div>
                    <input type="range" min="0" max="730" step="30" x-model="settings.decay"
                           class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
                <!-- Visibility -->
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-800">內部搜尋</div>
                        <div class="text-xs text-gray-400 mt-0.5">開啟後可搜尋內部知識（需要 read:internal 權限）</div>
                    </div>
                    <button @click="settings.visibility = settings.visibility === 'all' ? 'public' : 'all'"
                            class="relative w-11 h-6 rounded-full transition-colors"
                            :class="settings.visibility === 'all' ? 'bg-indigo-600' : 'bg-gray-200'">
                        <span class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"
                              :class="settings.visibility === 'all' ? 'translate-x-5' : 'translate-x-0'"></span>
                    </button>
                </div>
                <button @click="showSettingsModal = false"
                        class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                    完成
                </button>
            </div>
        </div>
    </div>

    <!-- Source Modal -->
    <div x-show="selectedSource" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak @click.self="selectedSource = null">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-bold text-gray-900" x-text="selectedSource?.title"></h3>
                    <p class="text-xs text-gray-500" x-text="'Source ID: ' + selectedSource?.id"></p>
                </div>
                <button @click="selectedSource = null" class="text-gray-400 hover:text-gray-600 bg-white p-2 rounded-full shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest block mb-1">Source ID</label>
                        <div class="text-sm font-mono text-gray-800" x-text="selectedSource?.id"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest block mb-1">Created At</label>
                        <div class="text-sm text-gray-800" x-text="formatFullDate(selectedSource?.created_at)"></div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest block mb-1">Question (Context)</label>
                    <div class="text-sm text-gray-800 bg-indigo-50/50 p-4 rounded-xl border border-indigo-100" x-text="selectedSource?.question"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-green-600 uppercase tracking-widest block mb-1">Answer (Knowledge)</label>
                    <div class="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed" x-text="selectedSource?.answer"></div>
                </div>
                <template x-if="selectedSource?.tags && selectedSource?.tags.length">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Tags</label>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="tag in selectedSource.tags" :key="tag">
                                <span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded" x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="bg-white border-t p-4 md:p-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <form @submit.prevent="sendMessage()" class="max-w-4xl mx-auto flex space-x-3 md:space-x-4">
            <input type="text" x-model="input" 
                   class="flex-1 border-gray-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 shadow-sm transition-all"
                   placeholder="輸入你的問題..."
                   :disabled="loading"
                   autofocus>
            <button type="submit" 
                    class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-700 disabled:opacity-50 transition-all shadow-md active:transform active:scale-95"
                    :disabled="loading || !input.trim()">
                <span x-show="!loading">發送</span>
                <svg x-show="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
        <p class="text-center text-[10px] text-gray-400 mt-3 font-medium">AI 回答可能會出錯，請確認重要資訊。</p>
    </footer>

    <script>
        function chatApp() {
            return {
                input: '',
                loading: false,
                loadingStatus: '',
                messages: [
                    { role: 'assistant', content: '你好！我是知識庫助手。有什麼我可以幫你的嗎？' }
                ],
                settings: {
                    hybrid: true,
                    model: 'gemini-2.5-flash',
                    decay: 180,
                    visibility: 'public',
                    apiKey: ''
                },
                selectedSource: null,
                showSettingsModal: false,
                apiKeyInput: '',

                init() {
                    this.settings.apiKey = localStorage.getItem('rag_api_key') || '';
                    this.apiKeyInput = this.settings.apiKey;
                    if (!this.settings.apiKey && !sessionStorage.getItem('rag_settings_dismissed')) {
                        this.showSettingsModal = true;
                    }
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && hljs.getLanguage(lang)) {
                                return hljs.highlight(code, { language: lang }).value;
                            }
                            return hljs.highlightAuto(code).value;
                        },
                        breaks: true
                    });
                },

                saveApiKey() {
                    const key = this.apiKeyInput.trim();
                    this.settings.apiKey = key;
                    if (key) localStorage.setItem('rag_api_key', key);
                    else localStorage.removeItem('rag_api_key');
                },

                async sendMessage() {
                    const query = this.input.trim();
                    if (!query || this.loading) return;

                    this.messages.push({ role: 'user', content: query });
                    const assistantMsgIndex = this.messages.push({ 
                        role: 'assistant', 
                        content: '', 
                        chunks: [],
                        queryContext: query, // Store the query directly for feedback
                        feedbackSent: false 
                    }) - 1;
                    
                    this.input = '';
                    this.loading = true;
                    this.loadingStatus = '正在搜尋知識庫...';

                    this.scrollToBottom();

                    try {
                        const headers = { 'Content-Type': 'application/json' };
                        if (this.settings.apiKey) headers['Authorization'] = 'Bearer ' + this.settings.apiKey;
                        const response = await fetch('/api/query', {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({
                                query,
                                hybrid: this.settings.hybrid,
                                model: this.settings.model,
                                decay: parseInt(this.settings.decay),
                                visibility: this.settings.visibility,
                                stream: true,
                                client: "web-ui"
                            })
                        });

                        if (!response.ok) throw new Error('API Error');

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop() || '';

                            for (const line of lines) {
                                if (!line.trim()) continue;
                                try {
                                    const data = JSON.parse(line);
                                    if (data.type === 'chunks') {
                                        this.messages[assistantMsgIndex].chunks = data.chunks;
                                        this.loadingStatus = '正在生成回答...';
                                    } else if (data.type === 'text') {
                                        this.messages[assistantMsgIndex].content += data.text;
                                    } else if (data.type === 'error') {
                                        this.messages[assistantMsgIndex].content = 'Error: ' + data.error;
                                    }
                                    this.scrollToBottom();
                                } catch (e) {
                                    console.error('Parse error', e, line);
                                }
                            }
                        }
                    } catch (err) {
                        this.messages[assistantMsgIndex].content = !this.settings.apiKey
                            ? '請先點擊右上角「設定」按鈕設定 API Key。'
                            : '系統發生錯誤，請稍後再試。';
                    } finally {
                        this.loading = false;
                        this.scrollToBottom();
                    }
                },

                renderMarkdown(content) {
                    if (!content) return '<span class="opacity-50 italic">AI 正在思考中...</span>';
                    return DOMPurify.sanitize(marked.parse(content));
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const el = document.getElementById('chat-messages');
                        el.scrollTop = el.scrollHeight;
                    });
                },

                showSource(chunk) {
                    this.selectedSource = chunk;
                },

                async sendFeedback(msg, score) {
                    if (!msg || msg.feedbackSent) return;
                    
                    try {
                        const fbHeaders = { 'Content-Type': 'application/json' };
                        if (this.settings.apiKey) fbHeaders['Authorization'] = 'Bearer ' + this.settings.apiKey;
                        const response = await fetch('/api/feedback', {
                            method: 'POST',
                            headers: fbHeaders,
                            body: JSON.stringify({
                                query: msg.queryContext,
                                answer: msg.content,
                                chunks: msg.chunks ? msg.chunks.map(c => c.id) : [],
                                score: score
                            })
                        });
                        
                        if (response.ok) {
                            msg.feedbackSent = true;
                        }
                    } catch (err) {
                        console.error('Failed to send feedback', err);
                    }
                },

                copyCode(btn) {
                    const pre = btn.parentElement;
                    const code = pre.querySelector('code').innerText;
                    navigator.clipboard.writeText(code);
                    btn.innerText = 'Copied!';
                    setTimeout(() => btn.innerText = 'Copy', 2000);
                },

                formatDate(dateStr) {
                    if (!dateStr) return 'unknown';
                    const date = new Date(dateStr);
                    return `${date.getFullYear()}/${date.getMonth() + 1}`;
                },

                formatFullDate(dateStr) {
                    if (!dateStr) return 'Unknown Date';
                    return new Date(dateStr).toLocaleString('zh-TW');
                }
            }
        }

        // Add copy button to pre blocks after marked renders
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('copy-btn')) {
                const pre = e.target.parentElement;
                const code = pre.querySelector('code').innerText;
                navigator.clipboard.writeText(code);
                const originalText = e.target.innerText;
                e.target.innerText = 'Copied!';
                setTimeout(() => e.target.innerText = originalText, 2000);
            }
        });
    </script>
    <script src="/nav.js"></script>
</body>
</html>
